{% extends "base.html" %}
{% block title %}About — Amanda Soganile{% endblock %}

{% block content %}
  <section id="hero">
    <div class="hero-ghost">AS</div>
    <div class="hero-inner">
      <div class="hero-text">
        <div class="eyebrow" id="hero-role"></div>
        <div class="hero-name" id="hero-firstname"></div>
        <div class="hero-name-accent" id="hero-lastname"></div>
        <div class="btns">
          <a href="/contact" class="btn-g">Get in touch</a>
        </div>
        <div class="hero-socials">
          <a href="https://github.com/AmandaSoganile" class="social-link" target="_blank" rel="noopener">GitHub</a>
          <span class="social-sep">&middot;</span>
          <a href="https://www.linkedin.com/in/amanda-soganile-8237ba365" class="social-link" target="_blank" rel="noopener">LinkedIn</a>
        </div>
      </div>
      <div class="hero-photo">
        <div class="photo-frame"><div class="photo-emoji">&#129469;&#8205;&#9792;&#65039;</div></div>
        <div class="sticky-note">hi, that&#39;s me</div>
      </div>
    </div>
    <div class="scroll-ind"><span>scroll</span><div class="scroll-line"></div></div>
  </section>

  <section id="about">
    <div class="section-inner">
      <div class="s-label">About me</div>
      <h2 class="s-title">The person <em>behind the code.</em></h2>
      <div class="about-grid reveal">
        <div class="about-left">
          <p class="about-bio" id="about-bio"></p>
          <p class="about-name-meaning" id="about-meaning"></p>
        </div>
        <div class="about-right">
          <div class="about-block">
            <div class="about-block-label">Things I love</div>
            <div class="about-chips" id="about-loves"></div>
          </div>
          <div class="about-block">
            <div class="about-block-label">Currently learning</div>
            <div class="about-chips" id="about-learning"></div>
          </div>
          <div class="about-block">
            <div class="about-block-label">Life goal</div>
            <p class="about-goal" id="about-goal"></p>
          </div>
        </div>
      </div>
    </div>
  </section>
{% endblock %}
